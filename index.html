<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Mon Anime Tracker</title>
  <link rel="stylesheet" href="style.css">
  <button id="themeToggle">Changer de thème</button>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#6c63ff">
</head>

<body>

  <h1>🎌 Mon Anime Tracker</h1>

  <nav>
    <button id="filterAll">Tous</button>
    <button id="filterCompleted">Vu</button>
    <button id="filterWatching">En cours</button>
    <button id="filterPlanned">À regarder</button>
  </nav>
  
  <div class="backup-controls">
    <button id="exportJson">📤 Exporter JSON</button>
    <input type="file" id="importJson" accept=".json" hidden>
    <button id="importBtn">📥 Importer JSON</button>
  </div>

 <div class="add-section">
  <input type="text" id="animeTitle" placeholder="Nom de l'animé">
  
  <select id="animeStatus">
    <option value="watching">En cours</option>
    <option value="completed">Vu</option>
    <option value="planned">À regarder</option>
  </select>

  <input type="number" id="animeRating" placeholder="Note /10" min="0" max="10">
  
  <input type="number" id="animeEpisodesWatched" placeholder="Épisodes vus">
  <input type="number" id="animeEpisodesTotal" placeholder="Total épisodes">

  <input type="text" id="animeImage" placeholder="URL de l'image">

  <textarea id="animeNotePersonal" placeholder="📝 Notes personnelles"></textarea>
  <textarea id="animeNoteCharacters" placeholder="👤 Personnages"></textarea>
  <input type="text" id="animeNoteGenres" placeholder="🎭 Genres (ex: Action, Fantasy)">
  <textarea id="animeNoteSummary" placeholder="📖 Résumé de l’animé"></textarea>
  
  <button id="addAnime">Ajouter</button>
 </div>

 <div class="search-section">
  <input type="text" id="searchInput" placeholder="Rechercher un animé...">
 </div>

 <div class="stats-container">
  <div class="stat-box">
    <h3>Total</h3>
    <p id="totalStat">0</p>
  </div>

  <div class="stat-box">
    <h3>Terminés</h3>
    <p id="completedStat">0</p>
  </div>

  <div class="stat-box">
    <h3>En cours</h3>
    <p id="watchingStat">0</p>
  </div>

  <div class="stat-box">
    <h3>À regarder</h3>
    <p id="plannedStat">0</p>
  </div>

  <div class="stat-box">
    <h3>Moyenne</h3>
    <p id="averageStat">0</p>
  </div>
 </div>

  <div class="progress-container">
    <p>Progression : <span id="progressPercent">0</span>%</p>
    <div class="progress-bar">
     <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>

  <div class="sort-container">
  <button id="sortRating">Note <span class="arrow"></span></button>
  <button id="sortTitle">Titre <span class="arrow"></span></button>
  <button id="sortRecent">Récent <span class="arrow"></span></button>
  </div>

  <main>
  <div class="anime-grid"></div>
  </main>

  <input type="text" id="imageInput">

 <div id="editModal" class="modal hidden">
  <div class="modal-content">
    <h2>Modifier l'animé</h2>

    <label>Statut :</label>
    <select id="editStatus">
      <option value="watching">En cours</option>
      <option value="completed">Vu</option>
      <option value="planned">À regarder</option>
    </select>

    <label>Note :</label>
    <input type="number" id="editRating" min="0" max="10">

    <label>Image URL :</label>
    <input type="text" id="editImage">

    <label>Épisodes vus :</label>
    <input type="number" id="editEpisodesWatched" min="0">

    <label>Total épisodes :</label>
    <input type="number" id="editEpisodesTotal" min="0">

    <label>🎭 Genres</label>
    <input type="text" id="editNoteGenres">

    <label>👤 Personnages</label>
    <textarea id="editNoteCharacters"></textarea>

    <label>📖 Résumé</label>
    <textarea id="editNoteSummary"></textarea>

    <label>📝 Notes personnelles</label>
    <textarea id="editNotePersonal"></textarea>    

    <div class="modal-buttons">
      <button id="saveEdit">Sauvegarder</button>
      <button id="cancelEdit">Annuler</button>
    </div>
   </div>
  </div>
 <script src="script.js"></script>
</body>
</html>
